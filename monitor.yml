name: Monitor Berita Sulut

# Jalan otomatis tiap 5 menit + bisa ditrigger manual dari tab Actions
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Permission diperlukan agar action bisa commit state.json
permissions:
  contents: write

concurrency:
  group: monitor-berita
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Jalankan monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOOKBACK_HOURS: "6"
          MAX_NEWS_PER_RUN: "15"
        run: python monitor_berita.py

      - name: Commit state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "Tidak ada perubahan state."
          fi
